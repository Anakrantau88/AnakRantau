<!DOCTYPE html>
<html>
<head>
    <title>Login Anak Rantau</title>
</head>
<body>
    <h1>Akses Internet Anak Rantau</h1>

    <!-- Tombol untuk Login Trial -->
    <h3>Coba Gratis</h3>
    <p>Dapatkan akses trial selama 1 jam.</p>
    <!-- Tautan ini harus persis sama dengan cara kerja tombol Trial di halaman default MikroTik -->
    <a href="http://40.40.40.1/login?target=lv&amp;dst=http://www.google.com">
        <button>✨ Mulai Trial Sekarang ✨</button>
    </a>

    <hr/>

    <!-- Form untuk Login dengan Voucher -->
    <h3>Login dengan Voucher</h3>
    <form method="post" action="http://40.40.40.1/login">
        <input type="text" name="username" placeholder="Username Voucher" required>
        <input type="password" name="password" placeholder="Password Voucher" required>
        <!-- 'dst' adalah parameter untuk redirect setelah sukses -->
        <input type="hidden" name="dst" value="https://anakrantau88.my.id">
        <button type="submit">🚀 Login</button>
    </form>
</body>
</html>
