<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login WiFi Anak Rantau</title>

<style>
body {
  font-family: Arial;
  background: #e6f7ff;
  text-align: center;
  padding: 50px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 320px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.logo {
  width: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #0077cc;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #005fa3;
}

a {
  color: #0077cc;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="box">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <h2>Login WiFi Anak Rantau</h2>

  <!-- FORM LOGIN -->
  <form action="$(link-login-only)" method="post">
    <input type="text" name="username" placeholder="Voucher / Username" required>
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Login</button>
  </form>

  <p style="font-size:12px; color:gray;">
    WiFi Cepat & Stabil untuk Anak Rantau
  </p>

  <p>Belum punya voucher?</p>
  <a href="https://anakrantau88.github.io/AnakRantau/">Beli Disini</a>

</div>

</body>
</html>
